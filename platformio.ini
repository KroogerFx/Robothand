; PlatformIO Project Configuration for Robot Hand - Dual Motor Control
; Two independent ESP32 devices for motor control with encoder feedback

[platformio]
default_envs = primary

[env:primary]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
monitor_speed = 115200
monitor_echo = On
monitor_raw = False
monitor_filters = send_on_enter
upload_speed = 921600

; Build only the primary source
build_src_filter = +<primary/> -<secondary/> -<main.cpp>

[env:secondary]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM4
monitor_speed = 115200
monitor_echo = On
monitor_raw = False
monitor_filters = send_on_enter
upload_speed = 921600

; Build only the secondary source
build_src_filter = +<secondary/> -<primary/> -<main.cpp>
